<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>单词收割机</title>
<style>
:root{--bg:#f6f4f1;--sur:#fff;--s2:#f2f0ec;--s3:#e7e4df;--ink:#1b1816;--ik2:#45413d;--mu:#7d7872;--ln:#e9e6e2;--ac:#0d9488;--ad:rgba(13,148,136,0.08);--su:#16a34a;--sb:#f0fdf4;--da:#dc2626;--db:#fef2f2;--am:#d97706;--bl:#2563eb;--pu:#7c3aed;--ra:16px;--rs:10px;--rx:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
button,input{font:inherit;outline:none}button{cursor:pointer;background:none;border:none}
.hid{display:none!important}

.app{display:flex;height:100vh}
.side{width:280px;min-width:280px;background:var(--sur);border-right:1px solid var(--ln);display:flex;flex-direction:column;z-index:40;transition:transform .25s}
.side-sec{padding:8px 10px}.side-sec+.side-sec{border-top:1px solid var(--ln);flex:1;display:flex;flex-direction:column;min-height:0}
.side-ttl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);margin-bottom:6px;padding:0 4px}
.flist{display:flex;flex-direction:column;gap:1px;margin-bottom:4px}
.fitem{display:flex;align-items:center;gap:6px;width:100%;padding:6px 8px;border-radius:var(--rx);font-size:12px;text-align:left;color:var(--ik2);transition:background .1s}
.fitem:hover{background:var(--s2)}.fitem.ac{background:var(--ad);color:#0f766e;font-weight:700}
.fitem .fi{font-size:13px;flex-shrink:0}.fitem .fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}.fitem .fs{display:block;font-size:10px;color:var(--mu)}
.up-row{margin-top:2px}.up-btn{display:block;width:100%;height:26px;border-radius:var(--rx);background:var(--s2);font-size:11px;font-weight:600;color:var(--mu);display:flex;align-items:center;justify-content:center;cursor:pointer}.up-btn:hover{background:var(--s3);color:var(--ink)}

.ftabs{display:flex;gap:2px;margin-bottom:6px}
.ftab{flex:1;height:26px;border-radius:var(--rx);font-size:10px;font-weight:600;color:var(--mu);background:var(--s2);display:flex;align-items:center;justify-content:center;gap:2px;transition:all .1s}
.ftab:hover{color:var(--ik2);background:var(--s3)}.ftab.ac{background:var(--ink);color:#fff}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:14px;height:14px;padding:0 3px;border-radius:7px;background:var(--da);color:#fff;font-size:9px;font-weight:700}.ftab.ac .badge{background:rgba(255,255,255,.3)}

.srch{width:100%;height:30px;padding:0 8px;border:1px solid var(--ln);border-radius:var(--rx);font-size:12px;background:var(--sur);margin-bottom:4px}.srch:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ad)}
.wlist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.wli{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:var(--rx);font-size:12px;text-align:left;color:var(--ik2);transition:background .1s}
.wli:hover{background:var(--s2)}.wli.ac{background:var(--ad);color:#0f766e;font-weight:700}
.wli .ww{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wdot{width:5px;height:5px;border-radius:50%;background:#d6d3d0;flex-shrink:0}
.wdot.l0{background:#d6d3d0}.wdot.l1{background:var(--da)}.wdot.l2{background:var(--am)}.wdot.l3{background:var(--bl)}.wdot.l4{background:var(--ac)}.wdot.l5{background:var(--su)}.wdot.l6{background:var(--pu)}

.sfoot{padding:6px 10px;border-top:1px solid var(--ln);display:flex;gap:4px}
.sfbtn{flex:1;height:28px;border-radius:var(--rx);font-size:10px;font-weight:600;color:var(--mu);background:var(--s2);transition:all .1s}.sfbtn:hover{background:var(--s3);color:var(--ink)}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.sbar{display:flex;align-items:center;gap:10px;padding:8px 18px;background:var(--sur);border-bottom:1px solid var(--ln);flex-shrink:0;flex-wrap:wrap}
.sbi{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;white-space:nowrap}
.sbi .sv{font-weight:800}.sbi .sl{color:var(--mu);font-weight:500;font-size:10px}
.sd{width:1px;height:18px;background:var(--ln)}
.pwrap{display:flex;align-items:center;gap:5px}
.pbar{width:50px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:var(--ac);border-radius:3px;transition:width .35s}
.ptxt{font-size:10px;font-weight:700;color:#0f766e;min-width:32px}
.ssp{flex:1}
.msw{display:flex;gap:2px;background:var(--s2);border-radius:var(--rx);padding:2px}
.mbtn{height:26px;padding:0 8px;border-radius:4px;font-size:10px;font-weight:700;color:var(--mu)}.mbtn:hover{color:var(--ik2)}.mbtn.ac{background:var(--sur);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ibtn{width:30px;height:30px;border-radius:var(--rx);font-size:15px;color:var(--mu);display:flex;align-items:center;justify-content:center}.ibtn:hover{background:var(--s2)}

.study{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:22px 16px 36px}
.welc{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;width:100%;max-width:540px;text-align:center}
.dz{border:2px dashed #d6d3d0;border-radius:16px;background:var(--sur);padding:40px 24px;transition:all .2s}.dz.dover{border-color:var(--ac);background:var(--ad)}
.dz h2{font-size:22px;font-weight:800;margin-bottom:6px}.dz .dp{font-size:13px;color:var(--mu);margin:4px 0}
.dbtn{display:inline-block;padding:10px 24px;border-radius:var(--rs);background:var(--ac);color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin:8px 0}.dbtn:hover{background:#0f766e}

.loading{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--mu);flex:1;justify-content:center}
.ldr{width:28px;height:28px;border:3px solid var(--ln);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

.card-wrap{width:760px;max-width:100%}
.scard{padding:44px 52px;background:var(--sur);border-radius:20px;border:1px solid var(--ln);box-shadow:0 1px 3px rgba(0,0,0,.03),0 16px 48px rgba(28,25,23,.09);animation:cin .28s ease}@keyframes cin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.scard.ok{box-shadow:0 0 0 3px var(--su),0 16px 48px rgba(28,25,23,.09)}.scard.no{box-shadow:0 0 0 3px var(--da),0 16px 48px rgba(28,25,23,.09)}
.lvlrow{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px}
.ldot{width:8px;height:8px;border-radius:50%;background:#d6d3d0;transition:all .3s}.ldot.fil{background:var(--ac)}.ldot.mst{background:var(--pu);box-shadow:0 0 5px rgba(124,58,237,.3)}
.lvltxt{font-size:12px;font-weight:700;color:var(--mu);letter-spacing:.3px}
.wzone{text-align:center;margin-bottom:24px;position:relative}
.word{font-size:clamp(30px,7vw,50px);font-weight:900;letter-spacing:-.7px;line-height:1.1;color:var(--ink);margin-bottom:2px;cursor:pointer;user-select:none;transition:filter .3s,opacity .3s}.word.blr{filter:blur(10px);opacity:.1}
.wblur{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;font-size:12px;color:var(--mu);opacity:0;transition:opacity .2s}.word.blr~.wblur{opacity:1}
.pron{font-size:18px;color:var(--mu);font-family:Georgia,serif;font-style:italic;display:flex;align-items:center;justify-content:center;gap:6px}
.spbtn{width:30px;height:30px;border-radius:50%;background:var(--s2);font-size:14px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--ln);flex-shrink:0}.spbtn:hover{background:var(--s3)}

.trans{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;justify-content:center}
.tpos{font-size:11px;font-weight:800;color:#0f766e;background:var(--ad);padding:3px 10px;border-radius:4px}.tmean{font-size:18px;color:var(--ink);font-weight:600}

.sents{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.sent{padding:18px 20px;background:var(--s2);border-radius:var(--rs);border-left:5px solid var(--ac)}.sent .en{font-size:18px;line-height:1.65;color:var(--ink);font-weight:500;margin-bottom:4px}.sent .cn{font-size:16px;color:var(--ik2);line-height:1.6}

.extras{margin-bottom:18px}
.xsec{border:1px solid var(--ln);border-radius:var(--rs);background:var(--s2);margin-bottom:6px;overflow:hidden}
.xsec summary{padding:10px 16px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--mu);cursor:pointer;list-style:none;display:flex;align-items:center;gap:4px;user-select:none}.xsec summary::-webkit-details-marker{display:none}.xsec summary::before{content:'▸';font-size:8px;width:10px;transition:transform .15s}.xsec[open] summary::before{transform:rotate(90deg)}.xsec summary:hover{color:var(--ink)}.xbody{padding:0 16px 12px}.xline{font-size:15px;line-height:1.7;color:var(--ik2);margin-bottom:4px}.xline b{color:var(--ink);font-weight:700}

.acts{display:flex;gap:10px;margin-bottom:16px}
.act{flex:1;height:48px;border-radius:var(--rs);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;border:2px solid transparent}
.act.no{background:var(--db);color:var(--da);border-color:#fecaca}.act.no:hover{background:#fee2e2;transform:translateY(-1px);box-shadow:0 3px 10px rgba(220,38,38,.1)}
.act.rv{background:#fffbeb;color:var(--am);border-color:#fde68a}.act.rv:hover{background:#fef3c7;transform:translateY(-1px);box-shadow:0 3px 10px rgba(217,119,6,.08)}
.act.ok{background:var(--sb);color:var(--su);border-color:#bbf7d0}.act.ok:hover{background:#dcfce7;transform:translateY(-1px);box-shadow:0 3px 10px rgba(22,163,74,.1)}

.navr{display:flex;align-items:center;justify-content:center;gap:14px}
.narr{width:36px;height:36px;border-radius:50%;font-size:14px;color:var(--mu);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;transition:all .15s}.narr:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.npos{font-size:12px;font-weight:700;color:var(--mu);min-width:60px;text-align:center}

.wtree{width:720px;max-width:100%;padding:26px 30px;background:var(--sur);border-radius:16px;border:1px solid var(--ln);box-shadow:0 8px 40px rgba(28,25,23,.08)}
.wtword{font-size:38px;font-weight:900;letter-spacing:-.5px;color:#0f766e;text-align:center;margin-bottom:4px}
.wtpron{text-align:center;font-size:14px;color:var(--mu);font-style:italic;margin-bottom:18px;font-family:Georgia,serif}
.wtb{margin:5px 0 5px 16px}.wtbh{display:flex;align-items:center;gap:4px;font-weight:700;font-size:15px;color:var(--ink);cursor:pointer;user-select:none;padding:3px 0;transition:color .1s}.wtbh:hover{color:var(--ac)}.wtba{font-size:8px;color:var(--mu);width:12px;flex-shrink:0;transition:transform .15s}.wtba.op{transform:rotate(90deg)}.wtbb{overflow:hidden;transition:max-height .25s}.wtbb.cl{max-height:0!important}
.wtl{padding:3px 0 3px 22px;font-size:14px;color:var(--ik2);line-height:1.6}.wtl .tpos{font-size:9px;margin-right:4px}
.wtleaf-s{margin-left:6px;padding:3px 8px;font-size:11px;color:var(--mu);border-left:2px solid var(--ln)}

.tblbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;width:100%}
.tblttl{font-size:13px;font-weight:700}.backbtn{padding:6px 12px;border-radius:var(--rx);font-size:11px;font-weight:600;color:#0f766e;background:var(--ad)}.backbtn:hover{background:rgba(13,148,136,.15)}
.tblwrap{overflow-x:auto;border:1px solid var(--ln);border-radius:var(--ra);background:var(--sur);width:100%}
table{width:100%;border-collapse:collapse;font-size:14px}thead{position:sticky;top:0;z-index:2}
th{padding:10px 14px;background:var(--s2);border-bottom:2px solid var(--ln);text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;cursor:pointer;color:var(--ik2)}th:hover{background:#dde6e1}
td{padding:9px 14px;border-bottom:1px solid var(--ln);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}tr{cursor:pointer;transition:background .1s}tr:hover td{background:#f8faf9}tr:last-child td{border-bottom:none}
.pager{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:10px}.pager button{min-width:28px;height:28px;border-radius:var(--rx);font-size:11px;font-weight:600;color:var(--ik2);border:1px solid var(--ln);background:var(--sur)}.pager button:hover{background:var(--s2)}.pager button.ac{border-color:var(--ac);background:var(--ac);color:#fff}.pager button:disabled{opacity:.3;cursor:default}.pinfo{padding:0 3px;color:var(--mu);font-size:11px}

.tree-wrap{border:1px solid var(--ln);border-radius:var(--ra);background:var(--sur);padding:12px 16px;width:100%;font-size:12px;font-family:"SF Mono","Fira Code","Consolas",monospace;line-height:1.6;overflow-x:auto}
.tnode{margin-left:16px}.tkey{display:flex;align-items:center;gap:2px;cursor:pointer;user-select:none}.tkey:hover{color:var(--ac)}.ttog{width:14px;font-size:8px;flex-shrink:0;color:var(--mu)}.tleaf{display:flex;align-items:baseline;gap:4px}.tp{color:#0f766e;font-weight:600}.ts{color:var(--da)}.tn{color:var(--bl)}.tb{color:var(--pu)}.tnl{color:var(--mu);font-style:italic}.tbr{color:var(--mu);font-weight:700}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(2px)}
.modal{width:min(440px,100%);max-height:80vh;background:var(--sur);border-radius:var(--ra);box-shadow:0 20px 50px rgba(0,0,0,.2);display:flex;flex-direction:column}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--ln)}.mttl{font-weight:700;font-size:14px}.mcls{width:28px;height:28px;border-radius:var(--rx);font-size:15px;color:var(--mu);display:flex;align-items:center;justify-content:center}.mcls:hover{background:var(--s2)}
.mbody{padding:14px 16px;overflow-y:auto}.mrow{margin-bottom:14px}.mrow label{display:block;font-size:12px;font-weight:700;margin-bottom:5px}.mrow input[type=number]{width:80px;height:32px;padding:0 8px;border:1px solid var(--ln);border-radius:var(--rx);font-size:13px}.itags{display:flex;gap:5px;flex-wrap:wrap}.itag{padding:3px 8px;border-radius:14px;background:var(--s2);font-size:11px;font-weight:600;color:var(--ik2)}
.dbtn2{width:100%;height:36px;border-radius:var(--rx);font-size:12px;font-weight:700;margin-top:6px}.dbtn2.rst{background:var(--db);color:var(--da)}.dbtn2.rst:hover{background:#fee2e2}.dbtn2.exp{background:#eff6ff;color:var(--bl)}.dbtn2.exp:hover{background:#dbeafe}.dbtn2.imp{background:#faf5ff;color:var(--pu)}.dbtn2.imp:hover{background:#ede9fe}
.sethint{margin-top:8px;font-size:10px;color:var(--mu);text-align:center}

.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;pointer-events:none;animation:tIn .3s ease,tOut .3s ease 2s forwards}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-18px)}}@keyframes tOut{to{opacity:0;transform:translateX(-50%) translateY(-18px)}}
.fitem-wrap{display:flex;align-items:center;gap:0}.fitem-wrap .fitem{flex:1}.fdel{width:22px;height:22px;border-radius:50%;font-size:11px;color:var(--mu);display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .15s}.fitem-wrap:hover .fdel{opacity:1}.fdel:hover{background:var(--db);color:var(--da)}.fidb{font-size:9px;color:var(--ac);font-weight:600}.fup{font-size:9px;padding:1px 5px;border-radius:6px;background:var(--ad);color:#0f766e;font-weight:700}
@media(max-width:780px){
.side{position:fixed;left:-280px;top:0;bottom:0;width:280px;min-width:280px;box-shadow:4px 0 25px rgba(0,0,0,.12)}.side.op{left:0}
.sbar{gap:6px;padding:5px 10px}.sd{display:none}.sl{display:none}.mbtn{font-size:9px;padding:0 6px}
.study{padding:14px 8px 28px}.scard{padding:24px 16px;border-radius:var(--rs)}.word{font-size:30px}
.acts{gap:5px}.act{height:42px;font-size:12px}.dz{padding:28px 14px}
}
</style>
</head>
<body>
<div class="app">
<aside class="side" id="side">
<div class="side-sec"><div class="side-ttl">词库</div><div class="flist" id="flist"><p style="font-size:11px;color:var(--mu);padding:6px 4px">连接服务器...</p></div><div class="up-row"><label class="up-btn">📂 上传 JSON<input type="file" id="filein" accept=".json" multiple hidden></label></div></div>
<div class="side-sec">
<div class="ftabs" id="ftabs"><button class="ftab ac" data-f="all">全部</button><button class="ftab" data-f="due">待复习<span class="badge" id="dbdg">0</span></button><button class="ftab" data-f="new">新词</button><button class="ftab" data-f="done">已掌握</button></div>
<input class="srch" id="ssrch" placeholder="搜索单词..." autocomplete="off"><div class="wlist" id="wlist"></div>
</div>
<div class="sfoot"><button class="sfbtn" id="tblbtn">📋 列表</button><button class="sfbtn" id="wtbtn">🌳 词树</button><button class="sfbtn" id="rtbtn">🔍 结构</button><button class="sfbtn" id="stbtn">⚙</button></div>
</aside>

<main class="main">
<div class="sbar">
<div class="sbi"><span>🔥</span><span class="sv" id="stv">0</span><span class="sl">天</span></div><div class="sd"></div>
<div class="sbi"><span>🎯</span><div class="pwrap"><div class="pbar"><div class="pfill" id="pfill"></div></div><span class="ptxt" id="ptxt">0/25</span></div></div><div class="sd"></div>
<div class="sbi"><span>⭐</span><span class="sv" id="msv">0</span><span class="sl">掌握</span></div><div class="sd"></div>
<div class="sbi"><span>💎</span><span class="sv" id="xpv">0</span><span class="sl">Lv.<span id="lvv">1</span></span></div><div class="ssp"></div>
<div class="msw"><button class="mbtn ac" data-m="smart">🧠 智能</button><button class="mbtn" data-m="random">🎲 随机</button><button class="mbtn" data-m="seq">📋 顺序</button></div>
<button class="ibtn" id="sdtog">☰</button>
</div>

<div class="study" id="study">
<div class="welc" id="welc"><div class="dz" id="dz"><div style="font-size:44px;margin-bottom:6px">📚</div><h2>单词收割机</h2><p class="dp">拖拽 JSON 文件到此处</p><p class="dp" style="font-size:11px">或</p><label class="dbtn">选择文件<input type="file" id="wfin" accept=".json" multiple hidden></label><p class="dp" style="font-size:11px;color:var(--mu)" id="shint">尝试连接词库服务器...</p></div></div>
<div class="loading hid" id="ldv"><div class="ldr"></div><p>正在解析词库...</p></div>

<div class="hid" id="cdv"><div class="card-wrap"><div class="scard" id="scard">
<div class="lvlrow"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div><span class="lvltxt" id="lvltxt">新词</span></div>
<div class="wzone"><h1 class="word" id="cword">—</h1><div class="wblur" id="cwblur"><span>点击显示单词</span></div><div class="pron"><span id="cpron"></span><button class="spbtn" id="cspk">🔊</button></div></div>
<div class="trans" id="ctrans"></div><div class="sents" id="csents"></div><div class="extras" id="cextras"></div>
<div class="acts"><button class="act no" id="btnno"><span>✕</span><span>不认识</span></button><button class="act rv" id="btnrv"><span>🙈</span><span>隐藏单词</span></button><button class="act ok" id="btnok"><span>✓</span><span>认识</span></button></div>
<div class="navr"><button class="narr" id="btnpr">◀</button><span class="npos" id="npos">1/1</span><button class="narr" id="btnnx">▶</button></div>
</div></div></div>

<script>
// ─── Ebbinghaus intervals ──────────────────────────────────
const IV = [0,1,2,4,7,15,30], MAXL = IV.length-1, SK = 'vh3';
function $(id){return document.getElementById(id)}

let store = (()=>{try{let r=localStorage.getItem(SK);return r?JSON.parse(r):{}}catch{return{}}})();
if(!store.stats) store.stats = {streak:0,lastStudyDate:'',totalReviews:0,totalCorrect:0,todayCount:0,dailyGoal:25,xp:0};
if(!store.words) store.words = {};
function svs(){localStorage.setItem(SK,JSON.stringify(store))}

let df=null, items=[], q=[], qi=0, filter='all', mode='smart', srch='', tpage=0, flc=false;
const PS=100;
let cfiles=[];
// ─── IndexedDB ────────────────────────────────────────────────
const DB_NAME='vh_files', DB_VER=1;
function idb(){return new Promise((ok,err)=>{let r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains('files'))r.result.createObjectStore('files')};r.onsuccess=()=>ok(r.result);r.onerror=err})}
async function idbSave(name,content){let db=await idb();return new Promise((ok,err)=>{let t=db.transaction('files','readwrite'),s=t.objectStore('files');s.put({name,content,time:Date.now()},name);t.oncomplete=ok;t.onerror=err})}
async function idbLoad(name){let db=await idb();return new Promise((ok,err)=>{let t=db.transaction('files','readonly'),s=t.objectStore('files'),r=s.get(name);r.onsuccess=()=>ok(r.result);r.onerror=err})}
async function idbList(){let db=await idb();return new Promise((ok,err)=>{let t=db.transaction('files','readonly'),s=t.objectStore('files'),r=s.getAll();r.onsuccess=()=>ok(r.result);r.onerror=err})}
async function idbDelete(name){let db=await idb();return new Promise((ok,err)=>{let t=db.transaction('files','readwrite'),s=t.objectStore('files');s.delete(name);t.oncomplete=ok;t.onerror=err})}


// ─── Helpers ───────────────────────────────────────────────
function io(v){return v!==null&&typeof v==='object'&&!Array.isArray(v)}
function ia(v){return Array.isArray(v)}
function isc(v){return v===null||typeof v==='string'||typeof v==='number'||typeof v==='boolean'}
function ss(v){if(v===null||v===undefined)return'';if(typeof v==='object')return JSON.stringify(v);return String(v)}
function fs(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}
function shf(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fk(){return df||store.currentFile||'default'}
function ws(id){let k=fk();if(!store.words[k])store.words[k]={};if(!store.words[k][id])store.words[k][id]={level:0,nextReview:0,reviews:0,correct:0,wrong:0,lastReview:0,firstSeen:Date.now()};return store.words[k][id]}
function cleanX(o){let out={};for(let[k,v]of Object.entries(o)){if(v!==''&&v!==null&&v!==undefined&&!(ia(v)&&v.length===0))out[k]=v}return out}

// ─── Normalization ─────────────────────────────────────────
function normItems(raw){
  let src=[];
  if(ia(raw))src=raw;
  else if(io(raw)){for(let v of Object.values(raw)){if(ia(v)&&v.length>0){src=v;break}}if(src.length===0)src=[raw]}
  return src.map(normItem);
}
function normItem(item){
  if(!io(item))return{id:ss(item),word:ss(item),phonetic:'',translations:[],sentences:[],extra:{},raw:item};
  let c4=item.content?.word?.content;
  if(c4){
    let trans=(c4.trans||[]).map(t=>({pos:t.pos||'',meaning:t.tranCn||''})).filter(t=>t.meaning);
    let sts=c4.sentence?.sentences||c4.realExamSentence?.sentences||[];
    let sentences=sts.filter(s=>s.sContent&&s.sCn).map(s=>({en:s.sContent,cn:s.sCn}));
    let word=item.headWord||c4.wordHead||'';
    let examQ=(c4.exam||[]).map(e=>({question:e.question||'',choices:(e.choices||[]).map(c=>c.choice),answer:e.answer?.explain||'',rightIdx:e.answer?.rightIndex}));
    return{id:word.toLowerCase(),word,phonetic:c4.usphone||c4.phone||'',translations:trans,sentences,extra:cleanX({
      ukphone:c4.ukphone||'',phrases:(c4.phrase?.phrases||[]).map(p=>({en:p.pContent||'',cn:p.pCn||''})),
      synos:(c4.syno?.synos||[]).map(s=>({pos:s.pos||'',words:(s.hwds||[]).map(h=>h.w).join('、'),meaning:s.tran||''})),
      rels:(c4.relWord?.rels||[]).map(r=>({pos:r.pos||'',words:(r.words||[]).map(w=>w.hwd+' '+(w.tran||'')).join('、')})),
      remMethod:c4.remMethod?.val||'',antos:(c4.antos?.antos||[]).map(a=>({pos:a.pos||'',words:(a.hwds||[]).map(h=>h.w).join('、'),meaning:a.tran||''})),exam:examQ
    }),raw:item};
  }
  let word=item.word||item.headWord||item.term||item.name||item.title||ss(item.id||'');
  let phonetic=item.phonetic||item.usphone||item.phone||'';
  let tl=item.translation||item.meaning||item.definition||'';
  let tArr=item.translations||(tl?[{pos:'',meaning:tl}]:[]);
  let sentences=[];let rs=item.sentences||item.examples||[];
  if(ia(rs))sentences=rs.map(s=>io(s)?{en:s.en||s.sContent||'',cn:s.cn||s.sCn||''}:{en:ss(s),cn:''}).filter(s=>s.en);
  return{id:word.toLowerCase(),word:ss(word),phonetic:ss(phonetic),translations:ia(tArr)?tArr:[{pos:'',meaning:ss(tArr)}],sentences,extra:cleanX({}),raw:item};
}

// ─── Load ──────────────────────────────────────────────────
function loadFromJson(json,filename){
  df=filename||'uploaded';store.currentFile=df;items=normItems(json);
  for(let it of items)ws(it.id);
  svs();upStats();buildQ();renderSide();renderFiles();showV('cdv');renderCard();
}
async function loadFile(filename){
  showV('ldv');
  try{let r=await fetch(filename);if(!r.ok)throw Error('fail');loadFromJson(await r.json(),filename);return}catch{}
  try{let entry=await idbLoad(filename);if(entry){loadFromJson(JSON.parse(entry.content),filename);return}}catch{}
  $('shint').textContent='\u274c \u52a0\u8f7d\u5931\u8d25: '+filename;showV('welc')
}
async function handleFiles(fl){
  let files=[...fl].filter(f=>f.name.endsWith('.json'));
  if(!files.length){toast('\u8bf7\u9009\u62e9 JSON \u6587\u4ef6');return}
  showV('ldv');let f=files[0];
  let raw=await new Promise((ok,err)=>{let rd=new FileReader();rd.onload=()=>ok(rd.result);rd.onerror=err;rd.readAsText(f)});
  try{await idbSave(f.name,raw)}catch(e){console.warn('IDB save failed',e)}
  try{await fetch('/api/upload?name='+encodeURIComponent(f.name),{method:'POST',body:raw,headers:{'Content-Type':'application/json'}})}catch{}
  try{loadFromJson(JSON.parse(raw),f.name);toast('\u5df2\u52a0\u8f7d '+f.name)}catch{toast('JSON \u89e3\u6790\u5931\u8d25');showV('welc')}
  await loadFileList();renderFiles();
}

// ─── Queue ─────────────────────────────────────────────────
function buildQ(){
  let ids=items.map((_,i)=>i);
  if(mode==='random'){shf(ids);q=ids}
  else if(mode==='seq'){q=ids}
  else{
    let due=ids.filter(i=>{let w=ws(items[i].id);return w.level>0&&w.level<MAXL&&w.nextReview<=Date.now()});
    let dn=ids.filter(i=>{let w=ws(items[i].id);return w.level===0&&w.reviews===0});
    let rest=ids.filter(i=>!due.includes(i)&&!dn.includes(i));
    shf(dn);shf(rest);q=[...due,...dn,...rest];
  }
  if(qi>=q.length)qi=0;
}
function filtIdxs(){
  return items.map((_,i)=>i).filter(i=>{
    let w=ws(items[i].id),wd=items[i].word.toLowerCase(),sq=srch.toLowerCase();
    if(sq&&!wd.includes(sq)){let tr=items[i].translations.map(t=>t.meaning).join(' ');if(!tr.toLowerCase().includes(sq))return false}
    switch(filter){case'due':return w.level>0&&w.level<MAXL&&w.nextReview<=Date.now();case'new':return w.level===0&&w.reviews===0;case'done':return w.level>=MAXL;default:return true}
  });
}

// ─── Stats ─────────────────────────────────────────────────
function upStats(){
  let st=store.stats,today=new Date().toISOString().slice(0,10);
  if(st.lastStudyDate!==today){
    let yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(st.lastStudyDate===yest)st.streak+=1;else if(st.lastStudyDate!==today)st.streak=st.todayCount>0?1:0;
    st.lastStudyDate=today;st.todayCount=0;svs();
  }
  let f=fk(),wa=store.words[f]||{},mst=0,dc=0;
  for(let[,w]of Object.entries(wa)){if(w.level>=MAXL)mst++;if(w.level>0&&w.level<MAXL&&w.nextReview<=Date.now())dc++}
  $('stv').textContent=st.streak;$('ptxt').textContent=st.todayCount+'/'+st.dailyGoal;
  let pct=Math.min(100,Math.round((st.todayCount/st.dailyGoal)*100));
  $('pfill').style.width=pct+'%';$('pfill').style.background=pct>=100?'var(--su)':'var(--ac)';
  $('msv').textContent=mst;$('xpv').textContent=st.xp;$('lvv').textContent=Math.floor(st.xp/100)+1;
  $('dbdg').textContent=dc;
}
function recReview(id,correct){
  let w=ws(id),st=store.stats,today=new Date().toISOString().slice(0,10);
  if(st.lastStudyDate!==today){let yest=new Date(Date.now()-86400000).toISOString().slice(0,10);st.streak=(st.lastStudyDate===yest)?st.streak+1:1;st.lastStudyDate=today;st.todayCount=0}
  w.reviews++;w.lastReview=Date.now();st.totalReviews++;st.todayCount++;
  if(correct){w.correct++;st.totalCorrect++;if(w.level<MAXL)w.level++;w.nextReview=Date.now()+IV[Math.min(w.level,MAXL)]*86400000;st.xp+=10+Math.min(w.level*2,10)}
  else{w.wrong++;w.level=Math.max(0,w.level-1);w.nextReview=Date.now()+IV[w.level]*86400000;st.xp=Math.max(0,st.xp-3)}
  svs();upStats();renderSide();
  if(st.todayCount===st.dailyGoal)toast('🎉 今日目标达成！');
  if(st.totalReviews>0&&st.totalReviews%100===0)toast('🔥 累计复习 '+st.totalReviews+' 次！');
  let nl=Math.floor(st.xp/100)+1,ol=Math.floor((st.xp-(correct?18:0))/100)+1;
  if(nl>ol)toast('⬆ 升级！Lv.'+nl);
}
function toast(m){
  let el=document.createElement('div');el.className='toast';el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}

// ─── Views ─────────────────────────────────────────────────
function showV(n){['welc','ldv','cdv','wtv','tbv','rtv'].forEach(v=>$(v).classList.toggle('hid',v!==n))}

// ─── Card ──────────────────────────────────────────────────
function renderCard(){
  if(!items.length){showV('welc');return}
  showV('cdv');
  if(qi>=q.length)buildQ();if(!q.length){showV('welc');return}
  let it=items[q[qi]],w=ws(it.id),ex=it.extra||{};

  // Level dots
  let ld=document.querySelectorAll('#scard .ldot');
  ld.forEach((d,i)=>{d.classList.remove('fil','mst');if(w.level>=MAXL)d.classList.add('mst');else if(i<w.level)d.classList.add('fil')});
  $('lvltxt').textContent=['新词','初识','短时','巩固','一周','长期','已掌握'][Math.min(w.level,MAXL)];

  // Word
  $('cword').textContent=it.word;$('cword').classList.toggle('blr',flc);
  $('cpron').textContent=it.phonetic?'/'+it.phonetic+'/':'';
  if(ex.ukphone&&ex.ukphone!==it.phonetic)$('cpron').textContent+='  英 /'+ex.ukphone+'/';

  // Reveal btn
  $('btnrv').innerHTML=flc?'<span>👁</span><span>显示单词</span>':'<span>🙈</span><span>隐藏单词</span>';

  // Translations
  $('ctrans').innerHTML=it.translations.length?it.translations.map(t=>'<span class="trans-item">'+(t.pos?'<span class="tpos">'+t.pos+'</span>':'')+'<span class="tmean">'+t.meaning+'</span></span>').join(''):'';

  // Sentences
  $('csents').innerHTML=it.sentences.length?it.sentences.map(s=>'<div class="sent"><p class="en">'+s.en+'</p><p class="cn">'+s.cn+'</p></div>').join(''):'';

  // Extras
  let eh='';
  if(ex.phrases?.length)eh+=xsec('短语','🔗',ex.phrases,p=>'<p class="xline"><b>'+p.en+'</b> '+p.cn+'</p>');
  if(ex.synos?.length)eh+=xsec('同近义词','📎',ex.synos,s=>'<p class="xline"><span class="tpos">'+s.pos+'</span> '+s.words+' '+s.meaning+'</p>');
  if(ex.antos?.length)eh+=xsec('反义词','↔',ex.antos,a=>'<p class="xline"><span class="tpos">'+a.pos+'</span> '+a.words+' '+a.meaning+'</p>');
  if(ex.rels?.length)eh+=xsec('同根词','🌱',ex.rels,r=>'<p class="xline"><span class="tpos">'+r.pos+'</span> '+r.words+'</p>');
  if(ex.remMethod)eh+='<details class="xsec"><summary>🧠 记忆方法</summary><div class="xbody"><p class="xline">'+ex.remMethod+'</p></div></details>';
  if(ex.exam?.length)eh+=xsec('📝 真题','📝',ex.exam,(e,i)=>'<p class="xline"><b>Q:</b> '+e.question+'<br>'+e.choices.map((c,j)=>(j+1===e.rightIdx?'<b>✓'+c+'</b>':c)).join(' / ')+'<br><span style="color:var(--mu);font-size:10px">'+e.answer+'</span></p>');
  $('cextras').innerHTML=eh;
  $('npos').textContent=(qi+1)+' / '+q.length;

  // Scroll sidebar
  requestAnimationFrame(()=>{let a=$('wlist').querySelector('.wli.ac');if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'})});
}
function xsec(title,icon,arr,fn){
  return '<details class="xsec"><summary>'+icon+' '+title+' ('+arr.length+')</summary><div class="xbody">'+arr.map(fn).join('')+'</div></details>';
}

function advCard(d){qi+=d;if(qi<0)qi=q.length-1;if(qi>=q.length){buildQ();qi=0}flc=false;let c=$('scard');c.classList.remove('ok','no');renderCard()}
function onKnow(){if(!q.length)return;recReview(items[q[qi]].id,true);let c=$('scard');c.classList.add('ok');setTimeout(()=>c.classList.remove('ok'),400);advCard(1)}
function onNo(){if(!q.length)return;recReview(items[q[qi]].id,false);let c=$('scard');c.classList.add('no');setTimeout(()=>c.classList.remove('no'),400);flc=false;renderCard()}
function onRv(){flc=!flc;renderCard()}
function onSpk(){if(!q.length)return;let it=items[q[qi]];if(!('speechSynthesis' in window)||!it.word)return;let u=new SpeechSynthesisUtterance(it.word);u.lang='en-US';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u)}

// ─── Sidebar ───────────────────────────────────────────────
function renderSide(){
  let idxs=filtIdxs(),max=200,shown=idxs.slice(0,max);
  let cur=q.length>0?q[qi]:-1;
  if(cur>=0&&!shown.includes(cur)) shown.push(cur);
  $('wlist').innerHTML=shown.map(i=>{
    let it=items[i],w=ws(it.id),ac=q.length>0&&q[qi]===i;
    return '<button class="wli'+(ac?' ac':'')+'" data-i="'+i+'"><span class="ww">'+it.word+'</span><span class="wdot l'+Math.min(w.level,MAXL)+'"></span></button>';
  }).join('')+(idxs.length>max&&!shown.includes(idxs[max])?'<p style="text-align:center;color:var(--mu);font-size:10px;padding:6px">... 还有 '+(idxs.length-max)+' 个</p>':'');
  $('wlist').querySelectorAll('.wli').forEach(btn=>{btn.addEventListener('click',()=>{
    let i=parseInt(btn.dataset.i),p=q.indexOf(i);if(p>=0)qi=p;else{q=[i,...q.filter(j=>j!==i)];qi=0}flc=false;renderCard();
    if(window.innerWidth<780) $('side').classList.remove('op');
  })});
  if(cur>=0) requestAnimationFrame(()=>{let a=$('wlist').querySelector('.wli.ac');if(a)a.scrollIntoView({block:'center',behavior:'smooth'})});
}
async function loadFileList(){
  cfiles=[];
  try{let r=await fetch('/api/files');if(r.ok){cfiles=await r.json()}}catch{}
  try{let idbFiles=await idbList();for(let f of idbFiles){if(!cfiles.some(x=>x.name===f.name)){cfiles.push({name:f.name,size:new Blob([f.content]).size,fromIdb:true})}}}catch{}
  if(cfiles.length===0){try{let r=await fetch('/files.json');if(r.ok)cfiles=await r.json()}catch{}}
  if(cfiles.length)$('shint').textContent='\u5df2\u8fde\u63a5 \u00b7 '+cfiles.length+' \u4e2a\u8bcd\u5e93';
  else $('shint').textContent='\u62d6\u62fd JSON \u6587\u4ef6\u4e0a\u4f20';
  return cfiles;
}
function renderFiles(){
  let fl=$('flist'),files=cfiles||[],h='';
  if(files.length)h+=files.map(f=>{
    let isIdb=f.fromIdb&&!files.some(x=>!x.fromIdb&&x.name===f.name);
    return '<div class="fitem-wrap"><button class="fitem'+(df===f.name?' ac':'')+'" data-f="'+f.name+'"><span class="fi">'+(f.fromIdb?'📂':'📄')+'</span><span class="fn">'+f.name+'</span><span class="fs">'+fs(f.size)+(f.fromIdb?' <span class="fidb">本地</span>':'')+'</span></button>'+(isIdb?'<button class="fdel" data-f="'+f.name+'" title="删除">&times;</button>':'')+'</div>';
  }).join('');
  if(df&&!files.some(f=>f.name===df))h+='<div class="fitem-wrap"><button class="fitem ac" data-f="'+df+'"><span class="fi">📂</span><span class="fn">'+df+'</span><span class="fup">已上传</span></button></div>';
  if(!h)h='<p style="font-size:11px;color:var(--mu);padding:6px 4px">无词库文件</p>';
  fl.innerHTML=h;
  fl.querySelectorAll('.fitem').forEach(btn=>{btn.addEventListener('click',()=>{let n=btn.dataset.f;if(n!==df){if(cfiles.some(f=>f.name===n))loadFile(n);else toast('此文件已加载')}})});
  fl.querySelectorAll('.fdel').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();let n=btn.dataset.f;if(confirm('删除 '+n+' 吗？')){idbDelete(n).then(()=>{cfiles=cfiles.filter(f=>f.name!==n);if(df===n){df=null;items=[];q=[];qi=0;showV('welc')}renderFiles();toast('已删除 '+n)}).catch(()=>toast('删除失败'))}})})}

// ─── Word Tree ─────────────────────────────────────────────
function renderWTree(){
  if(!items.length)return;showV('wtv');
  let it=items[q[qi]],w=ws(it.id),ex=it.extra||{},sid=0;
  let br=(icon,title,body,count)=>{
    let id='wtsec'+(sid++);
    return '<div class="wtb"><div class="wtbh" data-t="'+id+'"><span class="wtba op">▾</span>'+icon+' '+title+(count!=null?' ('+count+')':'')+'</div><div class="wtbb" id="'+id+'">'+body+'</div></div>';
  };
  let h='<div class="wtword">'+it.word+'</div><div class="wtpron">'+(it.phonetic?'/ '+it.phonetic+' /':'')+(ex.ukphone&&ex.ukphone!==it.phonetic?'  英 /'+ex.ukphone+'/':'')+'</div>';
  if(it.translations.length)h+=br('📝','释义',it.translations.map(t=>'<div class="wtl">'+(t.pos?'<span class="tpos">'+t.pos+'</span>':'')+t.meaning+'</div>').join(''),it.translations.length);
  if(it.sentences.length)h+=br('💬','例句',it.sentences.map(s=>'<div class="wtl"><div class="en" style="font-weight:500">'+s.en+'</div><div class="cn" style="font-size:11px;color:var(--ik2);margin-top:1px">'+s.cn+'</div></div>').join(''),it.sentences.length);
  if(ex.phrases?.length)h+=br('🔗','短语',ex.phrases.map(p=>'<div class="wtl"><b>'+p.en+'</b>  '+p.cn+'</div>').join(''),ex.phrases.length);
  if(ex.synos?.length)h+=br('📎','同近义词',ex.synos.map(s=>'<div class="wtl"><span class="tpos">'+s.pos+'</span> '+s.words+' '+s.meaning+'</div>').join(''),ex.synos.length);
  if(ex.antos?.length)h+=br('↔','反义词',ex.antos.map(a=>'<div class="wtl"><span class="tpos">'+a.pos+'</span> '+a.words+' '+a.meaning+'</div>').join(''),ex.antos.length);
  if(ex.rels?.length)h+=br('🌱','同根词',ex.rels.map(r=>'<div class="wtl"><span class="tpos">'+r.pos+'</span> '+r.words+'</div>').join(''),ex.rels.length);
  if(ex.remMethod)h+=br('🧠','记忆方法','<div class="wtl">'+ex.remMethod+'</div>');
  if(ex.exam?.length)h+=br('📝','真题',ex.exam.map((e,i)=>'<div class="wtl"><b>Q'+(i+1)+':</b> '+e.question+'<br>'+e.choices.map((c,j)=>(j+1===e.rightIdx?'<b>✓'+c+'</b>':c)).join(' / ')+'<br><span style="color:var(--mu);font-size:10px">'+e.answer+'</span></div>').join(''),ex.exam.length);
  h+=br('📊','学习统计','<div class="wtl">等级：'+['新词','初识','短时','巩固','一周','长期','已掌握'][Math.min(w.level,MAXL)]+'</div><div class="wtl">复习：'+w.reviews+' 次</div><div class="wtl">正确 '+w.correct+' / 错误 '+w.wrong+'</div>'+(w.reviews>0?'<div class="wtl">正确率：'+Math.round((w.correct/w.reviews)*100)+'%</div>':'')+(w.nextReview>Date.now()?'<div class="wtl">下次复习：'+new Date(w.nextReview).toLocaleDateString('zh-CN')+'</div>':w.level>0?'<div class="wtl" style="color:var(--da)">⚠ 需要复习</div>':''));
  $('wtcard').innerHTML=h;$('wtnp').textContent=(qi+1)+' / '+q.length;
  $('wtcard').querySelectorAll('.wtbh').forEach(bh=>{bh.addEventListener('click',()=>{let t=$(bh.dataset.t),a=bh.querySelector('.wtba');if(t){t.classList.toggle('cl');a.classList.toggle('op')}})});
}
function advWT(d){qi+=d;if(qi<0)qi=q.length-1;if(qi>=q.length){buildQ();qi=0}renderWTree()}

// ─── Table ─────────────────────────────────────────────────
function renderTable(){
  showV('tbv');let idxs=filtIdxs(),its=idxs.map(i=>items[i]);$('tblttl').textContent=(df||'数据')+' · '+its.length+' 词';
  $('tbh').innerHTML='<tr>'+['单词','释义','等级','复习','正确率','下次复习'].map(c=>'<th>'+c+'</th>').join('')+'</tr>';
  let tp=Math.ceil(its.length/PS);if(tpage>=tp)tpage=Math.max(0,tp-1);
  let start=tpage*PS,page=its.slice(start,start+PS);
  $('tbb').innerHTML=page.map((it,pi)=>{
    let w=ws(it.id),rate=w.reviews>0?Math.round((w.correct/w.reviews)*100)+'%':'—';
    let next=w.nextReview>Date.now()?new Date(w.nextReview).toLocaleDateString('zh-CN'):(w.level>0?'需复习':'—');
    let lvl=['新词','Lv1','Lv2','Lv3','Lv4','Lv5','已掌握'][Math.min(w.level,6)];
    return '<tr data-i="'+idxs[start+pi]+'"><td><b>'+it.word+'</b></td><td>'+it.translations.map(t=>t.meaning).join(' ')+'</td><td>'+lvl+'</td><td>'+w.reviews+'</td><td>'+rate+'</td><td>'+next+'</td></tr>';
  }).join('');
  $('tbb').querySelectorAll('tr').forEach(tr=>{tr.addEventListener('click',()=>{let i=parseInt(tr.dataset.i);q=[i,...q.filter(j=>j!==i)];qi=0;flc=false;renderCard();showV('cdv')})});
  if(tp<=1){$('tpgr').innerHTML='';return}
  let h='<button'+(tpage===0?' disabled':'')+' data-p="0">«</button>';
  h+='<button'+(tpage===0?' disabled':'')+' data-p="'+(tpage-1)+'">‹</button>';
  let s=Math.max(0,tpage-2),e=Math.min(tp,tpage+3);
  if(s>0)h+='<button data-p="0">1</button><span class="pinfo">…</span>';
  for(let i=s;i<e;i++)h+='<button'+(i===tpage?' class="ac"':'')+' data-p="'+i+'">'+(i+1)+'</button>';
  if(e<tp)h+='<span class="pinfo">…</span><button data-p="'+(tp-1)+'">'+tp+'</button>';
  h+='<button'+(tpage>=tp-1?' disabled':'')+' data-p="'+(tpage+1)+'">›</button>';
  h+='<button'+(tpage>=tp-1?' disabled':'')+' data-p="'+(tp-1)+'">»</button>';
  $('tpgr').innerHTML=h;
  $('tpgr').querySelectorAll('button').forEach(b=>{b.addEventListener('click',()=>{tpage=parseInt(b.dataset.p);renderTable()})});
}

// ─── Raw Tree ──────────────────────────────────────────────
function renderRTree(){
  showV('rtv');$('rtttl').textContent=df||'JSON 结构';
  $('troot').innerHTML=buildRN(store.words[fk()]||{},'wordStates');
  $('troot').querySelectorAll('.ttog').forEach(el=>{el.addEventListener('click',e=>{e.stopPropagation();let n=el.closest('.tkey');let c=n.nextElementSibling;if(c){let h=c.classList.toggle('hid');el.textContent=h?'▸':'▾'}})});
}
function buildRN(v,k){
  let t=v===null||v===undefined?'null':ia(v)?'array':typeof v;
  if(t==='null')return'<span class="tleaf"><span class="tp">'+k+':</span><span class="tnl">null</span></span>';
  if(t==='string')return'<span class="tleaf"><span class="tp">'+k+':</span><span class="ts">"'+esc(String(v))+'"</span></span>';
  if(t==='number')return'<span class="tleaf"><span class="tp">'+k+':</span><span class="tn">'+v+'</span></span>';
  if(t==='boolean')return'<span class="tleaf"><span class="tp">'+k+':</span><span class="tb">'+v+'</span></span>';
  if(t==='array'){
    if(v.length===0)return'<span class="tleaf"><span class="tp">'+k+':</span><span class="tbr">[]</span></span>';
    let lb=k?'<span class="tp">'+k+': </span>':'';
    if(v.every(x=>x===null||['string','number','boolean'].includes(typeof x))){let pv=v.slice(0,20).map(x=>typeof x==='string'?'"'+esc(x)+'"':x).join(', ');let mo=v.length>20?', … +'+(v.length-20):'';return'<span class="tleaf">'+lb+'<span class="tbr">[</span>'+pv+mo+'<span class="tbr">]</span></span>'}
    let h='<div class="tkey"><span class="ttog">▾</span>'+lb+'<span class="tbr">['+v.length+']</span></div><div class="tnode">';
    v.slice(0,100).forEach((x,i)=>{h+=buildRN(x,String(i))});if(v.length>100)h+='<span class="tleaf" style="color:var(--mu)">… +'+(v.length-100)+'</span>';
    return h+'</div>';
  }
  let lb=k?'<span class="tp">'+k+': </span>':'';let es=Object.entries(v);
  if(es.length===0)return'<span class="tleaf">'+lb+'<span class="tbr">{}</span></span>';
  let h='<div class="tkey"><span class="ttog">▾</span>'+lb+'<span class="tbr">{'+es.length+'}</span></div><div class="tnode">';
  for(let[kk,vv]of es)h+=buildRN(vv,kk);
  return h+'</div>';
}

// ─── Import/Export ─────────────────────────────────────────
function exportData(){
  let b=new Blob([JSON.stringify(store,null,2)],{type:'application/json'}),u=URL.createObjectURL(b);
  let a=document.createElement('a');a.href=u;a.download='vocab_harvester_backup.json';a.click();URL.revokeObjectURL(u);toast('📤 数据已导出');
}
function importData(file){
  let rd=new FileReader();rd.onload=()=>{try{let d=JSON.parse(rd.result);if(d.stats&&d.words){store={...d};svs();upStats();buildQ();renderSide();renderCard();toast('📥 数据已导入')}else toast('❌ 无效数据')}catch{toast('❌ 解析失败')}};rd.readAsText(file);
}

// ─── Event bindings ────────────────────────────────────────
$('btnok').addEventListener('click',onKnow);
$('btnno').addEventListener('click',onNo);
$('btnrv').addEventListener('click',onRv);
$('cspk').addEventListener('click',onSpk);
$('cword').addEventListener('click',()=>{flc=!flc;renderCard()});
$('cwblur').addEventListener('click',()=>{flc=false;renderCard()});

$('wfin').addEventListener('change',e=>handleFiles(e.target.files));

// Drag-drop

$('tblbtn').addEventListener('click',()=>{if(!items.length)return;tpage=0;renderTable()});

$('wtbak').addEventListener('click',()=>{renderCard();showV('cdv')});

// Word tree nav
$('wtpr').addEventListener('click',()=>advWT(-1));
$('wtnx').addEventListener('click',()=>advWT(1));

// Settings
$('stbtn').addEventListener('click',()=>{
  $('dginp').value=store.stats.dailyGoal;$('itags').innerHTML=IV.map((d,i)=>'<span class="itag">Lv'+i+': '+d+'天</span>').join(' ');$('modal').classList.remove('hid');
});
$('mcls').addEventListener('click',()=>$('modal').classList.add('hid'));
$('modal').addEventListener('click',e=>{if(e.target===$('modal'))$('modal').classList.add('hid')});
$('dginp').addEventListener('change',()=>{store.stats.dailyGoal=Math.max(5,Math.min(200,parseInt($('dginp').value)||25));svs();upStats()});
$('rstbtn').addEventListener('click',()=>{
  if(confirm('确定要重置所有学习进度吗？此操作不可恢复。')){store.words[fk()]={};store.stats={streak:0,lastStudyDate:'',totalReviews:0,totalCorrect:0,todayCount:0,dailyGoal:25,xp:0};svs();upStats();buildQ();renderSide();renderCard();$('modal').classList.add('hid');toast('🔄 进度已重置')}
});
$('expbtn').addEventListener('click',exportData);
$('impbtn').addEventListener('click',()=>$('impfin').click());

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
  let ic=!$('cdv').classList.contains('hid'),iw=!$('wtv').classList.contains('hid');
  if(ic){if(e.key==='ArrowLeft')advCard(-1);if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();advCard(1)}if(e.key==='1'||e.key==='a')onNo();if(e.key==='2'||e.key==='d')onKnow();if(e.key==='3'||e.key==='s'||e.key==='f')onRv();if(e.key==='r')onSpk()}
  if(iw){if(e.key==='ArrowLeft')advWT(-1);if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();advWT(1)}}
  if(e.key==='Escape'){if(!$('modal').classList.contains('hid'))$('modal').classList.add('hid');else if(iw||!$('tbv').classList.contains('hid')||!$('rtv').classList.contains('hid')){renderCard();showV('cdv')}else{flc=false;renderCard()}}
});

// ─── Init ──────────────────────────────────────────────────
(async()=>{
  let files=await loadFileList();renderFiles();
  if(files.length>0){if(store.currentFile&&files.some(f=>f.name===store.currentFile))await loadFile(store.currentFile);else await loadFile(files[0].name)}
  else{if(store.currentFile&&items.length===0){showV('welc');$('shint').textContent='离线模式 · 拖拽 JSON 文件上传'}else{showV('welc');$('shint').textContent='离线模式 · 拖拽 JSON 文件上传'}}
  upStats();renderFiles();
})();
